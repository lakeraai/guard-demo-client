guardrails:
  - guardrail_name: "lakera-guard-block"
    litellm_params:
      guardrail: lakera_v2
      default_on: false
      mode: "post_call"
      on_flagged: "block"
      api_key: os.environ/LAKERA_API_KEY
      api_base: os.environ/LAKERA_API_BASE
      project_id: os.environ/LAKERA_PROJECT_ID
  - guardrail_name: "lakera-guard-monitor"
    litellm_params:
      guardrail: lakera_v2
      default_on: false
      mode: "post_call"
      on_flagged: "monitor"
      api_key: os.environ/LAKERA_API_KEY
      api_base: os.environ/LAKERA_API_BASE
      project_id: os.environ/LAKERA_PROJECT_ID
