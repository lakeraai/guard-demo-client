name: 🐛 Bug Report
description: Report a reproducible problem in the demo environment
title: "[Bug]: "
labels: ["bug"]
body:

  - type: markdown
    attributes:
      value: |
        ## Before Submitting

        • This form is for a **single reproducible problem**
        • If this describes a new capability or enhancement, use the Feature Request template instead
        • Large multi-phase proposals belong in Discussions

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: This issue describes ONE specific problem only.
          required: true
        - label: I have searched existing issues.
          required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, Docker version (if used)
      placeholder: "MacOS 14.3, Python 3.11, Node 20, Docker 25"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide exact commands and steps to reproduce the issue.
      placeholder: |
        1. git clone ...
        2. python start_all.py
        3. Open UI
        4. Click X
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior (include full error output)
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Does this block demo startup? Break UI? Cosmetic only?